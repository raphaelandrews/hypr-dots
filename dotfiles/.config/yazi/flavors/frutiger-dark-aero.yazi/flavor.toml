[app]
overall = { bg = "#131813" } # Studio Night

[mgr]
cwd = { fg = "#5CFF47" } # Aero Grass Green
hovered         = { fg = "#131813", bg = "#5CFF47", bold = true }
preview_hovered = { fg = "#ECFFE0", bg = "#1a1f1a", bold = true }

find_keyword  = { fg = "#EAFF00", italic = true } # Electric Lemon
find_position = { fg = "#A0FF20", bg = "reset", italic = true } # Toxic Chartreuse

marker_copied   = { fg = "#A0FF20", bg = "#A0FF20" }
marker_cut      = { fg = "#FF3333", bg = "#FF3333" } # Glossy Stoplight Red
marker_marked   = { fg = "#5CFF47", bg = "#5CFF47" }
marker_selected = { fg = "#5CFF47", bg = "#5CFF47" }

count_copied   = { fg = "#131813", bg = "#A0FF20" }
count_cut      = { fg = "#131813", bg = "#FF3333" }
count_selected = { fg = "#131813", bg = "#5CFF47" }

border_symbol = "Ôöé"
border_style  = { fg = "#455545" } # Polished Graphite Green

[tabs]
active   = { fg = "#131813", bg = "#5CFF47", bold = true }
inactive = { fg = "#C0FEBD", bg = "#1a1f1a" }

[mode]
normal_main = { fg = "#131813", bg = "#5CFF47", bold = true }
normal_alt  = { fg = "#5CFF47", bg = "#1a1f1a"}

select_main = { fg = "#131813", bg = "#EAFF00", bold = true }
select_alt  = { fg = "#EAFF00", bg = "#1a1f1a"}

unset_main  = { fg = "#131813", bg = "#FF3333", bold = true }
unset_alt   = { fg = "#FF3333", bg = "#1a1f1a"}

[indicator]
parent = { fg = "#131813", bg = "#ECFFE0" }
current = { fg = "#131813", bg = "#5CFF47" }
preview = { fg = "#131813", bg = "#ECFFE0" }

[status]
sep_left  = { open = "¯éÂ", close = "¯é┤" }
sep_right = { open = "¯éÂ", close = "¯é┤" }

progress_label  = { fg = "#ECFFE0", bold = true }
progress_normal = { fg = "#A0FF20", bg = "#1a1f1a" }
progress_error  = { fg = "#FFD700", bg = "#FF3333" }

perm_type  = { fg = "#5CFF47" }
perm_read  = { fg = "#FFD700" } # Warning Sun Yellow
perm_write = { fg = "#FF3333" } # Glossy Stoplight Red
perm_exec  = { fg = "#EAFF00" } # Electric Lemon
perm_sep   = { fg = "#455545" }

[input]
border   = { fg = "#5CFF47" }
title    = { fg = "#ECFFE0" }
value    = { fg = "#C0FEBD" }
selected = { reversed = true }

[pick]
border   = { fg = "#5CFF47" }
active   = { fg = "#EAFF00" }
inactive = { fg = "#A4C4A4" }

[confirm]
border     = { fg = "#5CFF47" }
title      = { fg = "#5CFF47" }
btn_yes    = { reversed = true }
btn_no     = { fg = "#FF3333" }

[cmp]
border = { fg = "#5CFF47" }

[tasks]
border  = { fg = "#5CFF47" }
hovered = { fg = "#EAFF00", bold = true }

[which]
mask            = { bg = "#1a1f1a" }
cand            = { fg = "#5CFF47" }
rest            = { fg = "#A4C4A4" }
desc            = { fg = "#EAFF00" }
separator       = " ¯¬£ "
separator_style = { fg = "#139228" }

[help]
on      = { fg = "#5CFF47" }
run     = { fg = "#EAFF00" }
desc    = { fg = "#A4C4A4" }
hovered = { bg = "#139228", bold = true }
footer  = { fg = "#ECFFE0", bg = "#1a1f1a" }

[notify]
title_info  = { fg = "#5CFF47" }
title_warn  = { fg = "#FFD700" }
title_error = { fg = "#FF3333" }

[filetype]
rules = [
    { mime = "image/*", fg = "#5CFF47" },
    { mime = "{audio,video}/*", fg = "#EAFF00" },
    { mime = "application/*zip", fg = "#D4FF00" },
    { mime = "application/x-{tar,bzip*,7z-compressed,xz,rar}", fg = "#D4FF00" },
    { mime = "application/{pdf,doc,rtf}", fg = "#A0FF20" },
    { mime = "vfs/{absent,stale}", fg = "#758575" },
    { url = "*", is = "orphan", bg = "#FF3333" },
    { url = "*", is = "exec"  , fg = "#EAFF00" },
    { url = "*/", fg = "#5CFF47" },
]

[spot]
border = { fg = "#5CFF47" }
title  = { fg = "#5CFF47" }
tbl_cell = { fg = "#131813", bg = "#5CFF47" }
tbl_col = { fg = "#ECFFE0", bold = true }

