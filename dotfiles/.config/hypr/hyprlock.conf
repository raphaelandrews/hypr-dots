source = ~/.config/omarchy/current/theme/hyprlock.conf

background {
    monitor =
    color = $color
    path = ~/.config/omarchy/current/background
    blur_passes = 3
}

animations {
    enabled = false
}

input-field {
    monitor =
    size = 650, 100
    outline_thickness = 3
    
    Outer border: Aero Grass Green to True Vista Blue liquid gradient
    outer_color = rgba(5CFF47FF) rgba(0096FFB3) 45deg
    Inner glass: Dark Cobalt with high transparency
    inner_color = rgba(10, 25, 47, 0.85)
    Text: Glowing Ice White
    font_color = rgb(224, 251, 255)
    
    fade_on_empty = false
    placeholder_text = <span foreground="##BDE0FE"><i>Enter Password 🔑</i></span>
    
    State Colors
    check_color = rgb(255, 226, 122)    # Citrus Yellow
    fail_color = rgb(255, 93, 143)     # Candy Red
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    
    rounding = 12
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    
    position = 0, 0
    halign = center
    valign = center

    The "Aero Glow" effect
    shadow_passes = 2
    shadow_size = 10
    shadow_color = rgba(92, 255, 71, 0.4)
}

