include=~/.local/share/omarchy/default/mako/core.ini

# --- Frutiger Dark Aero Mako Config ---

# Studio Night background with 95% opacity for that deep glass look
background-color=#131813f2

# Aero Grass Green border
border-color=#5CFF47

# Glow White text for high-contrast "glow"
text-color=#ECFFE0

# Border styling for the "Rounded Aero" feel
border-size=2
border-radius=12

# Progress bar: Using Electric Lemon over Dark Emerald
# This creates a high-energy citrus contrast against the dark base
progress-color=over #EAFF00

# Text Highlighting (for things like summary or app name)
[urgency=high]
border-color=#FF3333  # Glossy Stoplight Red
text-color=#FFD700    # Warning Sun Yellow
default-timeout=0

[category=preview]
border-color=#139228  # Dark Emerald