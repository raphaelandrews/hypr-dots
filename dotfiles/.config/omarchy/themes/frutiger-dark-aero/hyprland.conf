# --- Frutiger Dark Aero Palette ---
# Main Accents
$aeroGreen   = rgb(5CFF47)
$emerald     = rgb(139228)
$toxic       = rgb(A0FF20)

# Neutrals & Surfaces
$borderMisty = rgb(758575) # Overlay2
$deepThicket = rgb(0a0d0a) # Mantle

# Border Gradient: Transitions from the bright Aero Green to the Dark Emerald
$activeBorderColor = $aeroGreen $emerald 45deg

general {
    # Using the glossy green gradient for active windows
    col.active_border = $activeBorderColor
    
    # Using a muted, industrial sage for inactive windows to simulate "dimmed" glass
    col.inactive_border = $borderMisty

    border_size = 2
    
    # Slight increase in gaps can help the "floating glass" Aero aesthetic
    gaps_in = 5
    gaps_out = 10
}

decoration {
    rounding = 10 # Rounded corners are essential for the Aero look
}

group {
    col.border_active = $activeBorderColor
    col.border_inactive = $borderMisty
    
    groupbar {
        # Tab bar styling
        col.active = $emerald
        col.inactive = $deepThicket
        text_color = rgb(ECFFE0) # Glow White
    }
}