# Font
font_family Hack Nerd Font
bold_italic_font auto
font_size        9.0

# Window
window_padding_width 10
window_padding_height 14
hide_window_decorations yes
show_window_resize_notification no
confirm_os_window_close 0
background_tint 0.1
background_opacity 0.85
background_blur 32
window_border_width 1px

# Keybindings
map F11 toggle_fullscreen
map ctrl+insert copy_to_clipboard
map shift+insert paste_from_clipboard

# Allow remote access
single_instance yes
allow_remote_control yes

# Aesthetics
include colors.conf
cursor_shape block
enable_audio_bell no

# Minimal Tab bar styling 
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

shell /usr/bin/zsh


## name:     Frutiger Dark Aero
## author:   Raphael Andrews
## blurb:    Abyssal emerald base with high-vibrancy aero accents.

# The basic colors
foreground              #ECFFE0
background              #131813
selection_foreground    #0a0d0a
selection_background    #5CFF47

# Cursor colors
cursor                  #5CFF47
cursor_text_color       #131813

# URL underline color (Using Electric Lemon)
url_color               #EAFF00

# Kitty window border colors
active_border_color     #5CFF47
inactive_border_color   #455545
bell_border_color       #FFD700

# OS Window titlebar colors
wayland_titlebar_color  system
macos_titlebar_color    system

# Tab bar colors
active_tab_foreground   #0a0d0a
active_tab_background   #5CFF47
inactive_tab_foreground #A4C4A4
inactive_tab_background #1a1f1a
tab_bar_background      #0a0d0a

# Colors for marks
mark1_foreground #131813
mark1_background #A0FF20
mark2_foreground #131813
mark2_background #D4FF00
mark3_foreground #131813
mark3_background #7FFF00

# The 16 terminal colors

# black (Studio Night / Industrial Sage)
color0 #131813
color8 #758575

# red (Glossy Stoplight Red)
color1 #FF3333
color9 #FF3333

# green (Aero Grass Green / Toxic Chartreuse)
color2  #5CFF47
color10 #A0FF20

# yellow (Warning Sun Yellow / Electric Lemon)
color3  #FFD700
color11 #EAFF00

# blue (Dark Emerald Accent / Deep Lime)
# Swapping blues for deep aero greens to keep the theme "Dark Aero Green"
color4  #139228
color12 #7FFF00

# magenta (Acid Lime)
color5  #D4FF00
color13 #D4FF00

# cyan (Toxic Chartreuse / Silver Moss)
color6  #A0FF20
color14 #A4C4A4

# white (Mist Green / Glow White)
color7  #C0FEBD
color15 #ECFFE0