# The Clock: More emphasis on the Green/Yellow vibe
label {
    monitor =
    text = $TIME
    color = $lemon # Electric Lemon for the main time
    font_size = 110
    font_family = Hack Nerd Font
    font_weight = bold
    
    position = 0, 180
    halign = center
    valign = center
    
    # Layered shadow: Dark Emerald depth with an Aero Green glow
    shadow_passes = 4
    shadow_size = 6
    shadow_color = rgba(92, 255, 71, 0.7) 
}

# Sub-label for Date/User
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%A, %d %B')"
    color = $aero_green
    font_size = 24
    font_family = Hack Nerd Font
    position = 0, 90
    halign = center
    valign = center
}