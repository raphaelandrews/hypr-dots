# The Clock: Use a clean font with a subtle shadow
label {
    monitor =
    text = $TIME
    color = $font_color
    font_size = 95
    font_family = Hack Nerd Font
    position = 0, 150
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 5
    shadow_color = rgba(87, 250, 111, 0.5) # Glowing Green Shadow
}