# --- Variables: The Deep Sea Glass Palette ---

# Studio Black Base (increased density for better contrast)
$color = rgba(1B1B1BF2) 

# The "Inner Liquid" (A dark-to-light grey gradient)
$inner_color = rgba(2B2B2B99) 

# The "Aero Grass Green" Outer Edge
$outer_color = rgba(57FA6FFF) 

# Glow White for that etched glass look
$font_color = rgb(ECFFE0) 

# Accent Highlights
$check_color = rgb(FFD700) 
$fail_color = rgb(FF3333) 

# Dark Green Accent Aura (Increased intensity for the "Glow")
$outer_aura = rgba(139228B3) 

