    #outline_thickness = 4
    
    # BORDER: A 3-color gradient to get that "liquid/plastic" Aero edge
    # Transitions from Lemon to Aero Green to Emerald
    #outer_color = $lemon $aero_green $emerald 30deg
    
    # INNER: Deep dark glass
    #inner_color = $surface_dark
    
    # TEXT: Glow White with a bold placeholder
