# --- Variables: Frutiger Dark Aero High-Gloss ---

$aero_green    = rgb(5CFF47) # Primary Accent
$emerald       = rgb(139228) # Dark Accent
$lemon         = rgb(EAFF00) # Electric Lemon
$sun_yellow    = rgb(FFD700) # Warning Sun Yellow
$glow_white    = rgb(ECFFE0) # Text Glow
$surface_dark  = rgba(15, 26, 15, 0.85) # Dark Pine Chrome

