# The Clock: Use a clean font with a subtle shadow
label {
    monitor =
    text = $TIME
    color = $font_color
    font_size = 95
    font_family = Inter Bold # Or Montserrat/Caskaydia
    position = 0, 150
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 5
    shadow_color = rgba(92, 255, 71, 0.5) # Glowing Green Shadow
}