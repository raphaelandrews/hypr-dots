# Ice White for that etched glass look
$font_color = rgb(E0FBFF) 

# Accent Highlights
$check_color = rgb(FFE27A) 
$fail_color = rgb(FF5D8F) 

# True Vista Blue Aura (Increased intensity for the "Glow")
$outer_aura = rgba(0096FFB3) 

