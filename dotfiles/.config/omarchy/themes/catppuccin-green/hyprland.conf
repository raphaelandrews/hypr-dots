# Hyprland Colors - Variant 3 (Green-Teal 165°)
$activeBorderColor = rgb(a6da95)
$inactiveBorderColor = rgb(416154)

general {
    # Using a solid color for the border
    col.active_border = $activeBorderColor
    col.inactive_border = $inactiveBorderColor

    # Optional: If you want a gradient look matching your fastfetch dots:
    # col.active_border = rgba(a6da95ee) rgba(8bd5caee) 45deg
}

group {
    col.border_active = $activeBorderColor
    col.border_inactive = $inactiveBorderColor

    groupbar {
        col.active = $activeBorderColor
        col.inactive = $inactiveBorderColor
        text_color = rgb(c0e0d6)
    }
}