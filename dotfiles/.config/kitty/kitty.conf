# Font
font_family JetBrainsMono Nerd Font
bold_italic_font auto
font_size        9.0

# Window
window_padding_width 10
window_padding_height 14
hide_window_decorations yes
show_window_resize_notification no
confirm_os_window_close 0
background_tint 0.25
background_opacity 0.8

# Selection
copy_on_select clipboard
clear_selection_on_clipboard_loss yes

# Keybindings
map F11 toggle_fullscreen
map ctrl+insert combine : copy_to_clipboard : clear_selection
map kitty_mod+c combine : copy_to_clipboard : clear_selection
map shift+insert paste_from_clipboard

# Allow remote access
single_instance yes
allow_remote_control yes

# Aesthetics
include colors.conf
cursor_shape block
enable_audio_bell no

# Minimal Tab bar styling 
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

shell /usr/bin/zsh